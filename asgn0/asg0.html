<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Assignment 0</title>
</head>

<body onload="main()">
    <canvas id="example" width="400" height="400" style="background-color: black;">
        Please use a browser that supports "canvas"
    </canvas>

    <br />
    <label>v1 x: <input type="number" id="v1x" value="0" /></label>
    <label>y <input type="number" id="v1y" value="0" /></label>
    <br />
    <label>v2 x: <input type="number" id="v2x" value="0" /></label>
    <label>y <input type="number" id="v2y" value="0" /></label>
    <br />
    <input type="button" id="drawBtn" value="Draw" onclick="handleDrawEvent()" />

    <br /><br />
    <label>Operation:
        <select id="operation">
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
            <option value="mul">Multiply</option>
            <option value="div">Divide</option>
            <option value="angle">Angle Between</option>
            <option value="area">Area</option>
            <option value="magnitude">Magnitude</option>
            <option value="normalize">Normalize</option>

        </select>

    </label>
    <label>Scalar: <input type="number" id="scalar" value="1" /></label>
    <br />
    <input type="button" id="opBtn" value="Draw" onclick="handleDrawOperationEvent()" />

    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
</body>
